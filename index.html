<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glorita y Yo: Unidos en el Alma</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0a0e;
    --gold: #e8c97a;
    --wine: #8b2240;
    --paper: #fdf6f0;
    --paper2: #f7ede3;
    --text: #3d1c1c;
    --gold-shadow: rgba(232,201,122,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }
  .petal-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .petal { position:absolute; top:-60px; opacity:0.7; animation:fall linear infinite; user-select:none; }
  @keyframes fall {
    0%   { transform:translateY(0) rotate(0deg) translateX(0); opacity:0.8; }
    50%  { transform:translateY(50vh) rotate(180deg) translateX(var(--sway)); opacity:0.6; }
    100% { transform:translateY(110vh) rotate(360deg) translateX(0); opacity:0; }
  }
  #entry {
    position:relative; z-index:10; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:24px; padding:40px;
  }
  .entry-title {
    font-family:'Great Vibes',cursive;
    font-size:clamp(3rem,8vw,5.5rem);
    color:var(--gold);
    animation:glow 2.5s ease-in-out infinite alternate;
    line-height:1.1;
  }
  @keyframes glow {
    from { text-shadow:0 0 20px var(--gold-shadow),0 0 40px rgba(232,201,122,0.1); }
    to   { text-shadow:0 0 40px rgba(232,201,122,0.6),0 0 80px rgba(232,201,122,0.25); }
  }
  .entry-sub { font-family:'Great Vibes',cursive; font-size:clamp(1.2rem,3vw,1.8rem); color:rgba(232,201,122,0.75); }
  .entry-date { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(0.9rem,2.5vw,1.1rem); color:rgba(232,201,122,0.5); letter-spacing:0.3em; text-transform:uppercase; }
  .divider { width:200px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); position:relative; }
  .divider::before { content:'❧'; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:var(--gold); font-size:1rem; background:var(--bg); padding:0 8px; }
  #openBtn {
    margin-top:10px; padding:14px 48px;
    border:1.5px solid var(--gold); background:transparent;
    color:var(--gold); font-family:'Cormorant Garamond',serif;
    font-style:italic; font-size:1.2rem; letter-spacing:0.2em;
    cursor:pointer; position:relative; overflow:hidden; transition:color 0.3s;
  }
  #openBtn::before { content:''; position:absolute; inset:0; background:var(--gold); transform:scaleX(0); transform-origin:left; transition:transform 0.4s ease; z-index:-1; }
  #openBtn:hover { color:var(--bg); }
  #openBtn:hover::before { transform:scaleX(1); }

  #bookScene {
    position:relative; z-index:10; display:none;
    perspective:2000px; width:min(95vw,900px); height:min(85vh,600px);
  }
  #book {
    width:100%; height:100%;
    transform-style:preserve-3d;
    transform:rotateY(-90deg) scale(0.6); opacity:0;
    transition:transform 1.2s cubic-bezier(0.34,1.1,0.64,1),opacity 0.8s ease;
    display:flex; border-radius:4px 12px 12px 4px;
    box-shadow:0 30px 80px rgba(0,0,0,0.7),0 0 60px rgba(139,34,64,0.15);
  }
  #book.open { transform:rotateY(0deg) scale(1); opacity:1; }

  .spine {
    width:36px; min-width:36px;
    background:linear-gradient(180deg,#2a0d15 0%,#8b2240 30%,#6b1a30 60%,#2a0d15 100%);
    border-radius:4px 0 0 4px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset -3px 0 10px rgba(0,0,0,0.4); position:relative;
  }
  .spine-text { writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg); font-family:'Great Vibes',cursive; font-size:0.85rem; color:var(--gold); letter-spacing:0.15em; opacity:0.85; }
  .spine::before,.spine::after { content:'✦'; position:absolute; color:var(--gold); font-size:0.6rem; opacity:0.6; }
  .spine::before { top:12px; } .spine::after { bottom:12px; }

  .page-left,.page-right { flex:1; height:100%; padding:20px; position:relative; overflow:hidden; }
  .page-left {
    background:linear-gradient(135deg,var(--paper) 0%,var(--paper2) 100%);
    border-right:1px solid rgba(184,153,42,0.25);
    display:flex; align-items:center; justify-content:center;
  }
  .page-right {
    background:linear-gradient(135deg,var(--paper2) 0%,var(--paper) 100%);
    border-radius:0 12px 12px 0; overflow-y:auto;
  }
  .page-right::before {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(transparent,transparent 27px,rgba(61,28,28,0.06) 27px,rgba(61,28,28,0.06) 28px);
    pointer-events:none;
  }
  .page-left::before { content:''; position:absolute; top:14px; left:14px; width:28px; height:28px; border:2px solid var(--gold); border-right:none; border-bottom:none; opacity:0.55; }
  .page-left::after  { content:''; position:absolute; top:14px; right:14px; width:28px; height:28px; border:2px solid var(--gold); border-left:none; border-bottom:none; opacity:0.55; }

  /* PHOTO + STICKERS CONTAINER */
  .photo-sticker-wrap {
    display:flex; flex-direction:column; align-items:center;
    gap:0; width:100%; max-width:280px;
  }

  /* STICKER TOP */
  .sticker-top {
    width:110px; height:110px;
    object-fit:contain;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,0.35));
    transform:rotate(6deg) translateY(18px);
    z-index:3; position:relative;
    animation:floatTop 3s ease-in-out infinite alternate;
  }
  @keyframes floatTop {
    from { transform:rotate(6deg) translateY(18px); }
    to   { transform:rotate(4deg) translateY(12px); }
  }

  /* PHOTO FRAME */
  .frame-outer {
    border:3px solid var(--gold); padding:7px;
    background:var(--paper);
    box-shadow:0 8px 30px rgba(0,0,0,0.25),inset 0 0 20px rgba(232,201,122,0.08);
    position:relative; z-index:2; width:100%;
  }
  .frame-outer::before { content:''; position:absolute; inset:4px; border:1px solid rgba(232,201,122,0.4); pointer-events:none; }
  .fc { position:absolute; width:20px; height:20px; background:var(--gold); clip-path:polygon(0 0,100% 0,100% 20%,20% 20%,20% 100%,0 100%); opacity:0.85; }
  .fc-tl{top:-2px;left:-2px;} .fc-tr{top:-2px;right:-2px;transform:scaleX(-1);} .fc-bl{bottom:-2px;left:-2px;transform:scaleY(-1);} .fc-br{bottom:-2px;right:-2px;transform:scale(-1);}
  .frame-photo { width:100%; height:240px; object-fit:cover; object-position:top; display:block; filter:sepia(0.08) contrast(1.05); }
  .frame-caption { text-align:center; padding:8px 8px 3px; font-family:'Great Vibes',cursive; font-size:1rem; color:var(--wine); }

  /* STICKER BOTTOM */
  .sticker-bottom {
    width:130px; height:130px;
    object-fit:contain;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,0.35));
    transform:rotate(-5deg) translateY(-14px);
    z-index:3; position:relative;
    animation:floatBot 3.5s ease-in-out infinite alternate;
  }
  @keyframes floatBot {
    from { transform:rotate(-5deg) translateY(-14px); }
    to   { transform:rotate(-3deg) translateY(-8px); }
  }

  /* RIGHT PAGE */
  .page-right-inner { position:relative; padding:18px 22px 18px 44px; min-height:100%; }
  .dedication-title { font-family:'Great Vibes',cursive; font-size:1.6rem; color:var(--wine); text-align:center; margin-bottom:8px; opacity:0; transition:opacity 0.6s ease; }
  .dedication-date { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.8rem; color:rgba(61,28,28,0.5); text-align:center; letter-spacing:0.2em; margin-bottom:18px; opacity:0; transition:opacity 0.6s 0.3s ease; }
  .dedication-title.show,.dedication-date.show { opacity:1; }
  #typeTarget { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(0.78rem,1.4vw,0.9rem); color:var(--text); line-height:1.72; white-space:pre-wrap; position:relative; z-index:2; }
  .cursor { display:inline-block; width:2px; height:1em; background:var(--wine); vertical-align:text-bottom; animation:blink 0.8s step-end infinite; margin-left:1px; }
  @keyframes blink { 50%{opacity:0;} }
  #pencil { position:absolute; left:10px; top:70px; width:22px; transition:top 0.15s linear; opacity:0; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

  #audioBtn {
    position:fixed; bottom:20px; right:20px; z-index:100;
    width:44px; height:44px; border-radius:50%;
    border:1.5px solid var(--gold); background:rgba(26,10,14,0.85);
    color:var(--gold); font-size:1.2rem; cursor:pointer;
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(8px); transition:background 0.3s;
  }
  #audioBtn:hover { background:rgba(232,201,122,0.15); }
  #audioBtn.show { display:flex; }
  .page-right::-webkit-scrollbar { width:4px; }
  .page-right::-webkit-scrollbar-thumb { background:rgba(232,201,122,0.3); border-radius:2px; }
</style>
</head>

<audio id="bgAudio" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>
<button id="audioBtn" onclick="toggleAudio()" title="Pausar/Reanudar música">♪</button>

<script>
const DEDICATION = `Mi vida… 💛

Hoy cumplimos 11 meses… y no sabes lo mucho que significa para mí poder decirlo, poder sentirlo y sobre todo poder vivirlo contigo.

No es solo el tiempo… es todo lo que hemos construido dentro de él. Cada conversación, cada desvelo, cada risa, cada momento en el que sin darnos cuenta nos fuimos volviendo parte el uno del otro. Porque contigo no fue algo pasajero… contigo fue real desde el alma.

Hay algo en ti que no puedo explicar del todo… pero lo siento. Lo siento en la forma en que me haces falta, en cómo me cambias el día con un solo mensaje, en cómo sin estar a mi lado físicamente logras estar presente en todo lo que soy. Tú no solo llegaste a mi vida… te quedaste en mi corazón de una manera profunda y bonita.

Me encanta saber que eres tú… que eres mi Glorita, la persona con la que puedo ser yo sin miedo, la que me da calma cuando todo se siente raro, la que con su forma de ser me hace querer ser mejor cada día.

Hoy no solo celebramos 11 meses… celebramos todo lo que sentimos, lo que hemos superado y lo que seguimos eligiendo construir juntos. Porque yo te sigo eligiendo… todos los días.

Gracias por existir en mi vida de esta manera tan especial… gracias por tu amor, por tu ternura, por tu forma tan única de hacerme sentir querido.

Te quiero muchísimo, mi amor… y lo que siento por ti es de verdad. 💫`;

const petalCanvas = document.getElementById('petalCanvas');
const PETALS = ['🌹','🌸','❤️','💛','✨','🌺','💕'];
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = PETALS[Math.floor(Math.random() * PETALS.length)];
  const left = Math.random() * 100;
  const dur = 6 + Math.random() * 10;
  const sway = (Math.random() - 0.5) * 120;
  el.style.cssText = `left:${left}%;animation-duration:${dur}s;animation-delay:${-Math.random()*dur}s;--sway:${sway}px;font-size:${0.9+Math.random()*0.9}rem;`;
  petalCanvas.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000);
}
for (let i = 0; i < 25; i++) spawnPetal();
setInterval(spawnPetal, 600);

function openBook() {
  document.getElementById('entry').style.display = 'none';
  const scene = document.getElementById('bookScene');
  scene.style.display = 'flex';
  scene.style.alignItems = 'center';
  scene.style.justifyContent = 'center';
  const audio = document.getElementById('bgAudio');
  audio.volume = 0.55;
  audio.play().catch(() => {});
  document.getElementById('audioBtn').classList.add('show');
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById('book').classList.add('open');
      setTimeout(startTypewriter, 1200);
    }, 50);
  });
}

let playing = true;
function toggleAudio() {
  const audio = document.getElementById('bgAudio');
  const btn = document.getElementById('audioBtn');
  if (playing) { audio.pause(); btn.textContent = '♫'; playing = false; }
  else { audio.play(); btn.textContent = '♪'; playing = true; }
}

function startTypewriter() {
  const titleEl = document.getElementById('dedTitle');
  const dateEl  = document.getElementById('dedDate');
  const target  = document.getElementById('typeTarget');
  const pencil  = document.getElementById('pencil');
  const rightInner = document.getElementById('rightInner');
  titleEl.classList.add('show');
  setTimeout(() => dateEl.classList.add('show'), 400);
  pencil.style.opacity = '1';
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  target.appendChild(cursor);
  function updatePencil() {
    const cr = cursor.getBoundingClientRect();
    const ir = rightInner.getBoundingClientRect();
    pencil.style.top = Math.max(60, cr.top - ir.top - 20) + 'px';
  }
  function typeChar() {
    if (i >= DEDICATION.length) { cursor.remove(); pencil.style.opacity = '0'; return; }
    const ch = DEDICATION[i];
    target.insertBefore(document.createTextNode(ch), cursor);
    i++;
    document.getElementById('rightPage').scrollTop += 1;
    updatePencil();
    let delay = 38;
    if (ch === '.' || ch === '…') delay = 260;
    else if (ch === ',') delay = 130;
    else if (ch === '\n') delay = 200;
    else if (ch === ' ') delay = 22;
    else delay = 28 + Math.random() * 25;
    setTimeout(typeChar, delay);
  }
  setTimeout(typeChar, 600);
}
</script>
